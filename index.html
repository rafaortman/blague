<link rel="icon" href="assets/img/favicon.png">

<style>
  :root {
    --bg: #000000;
    --bg-alt: #1b1b18;
    --concrete: #a9a496;
    --concrete-dim: #6f6b60;
    --ink: #efece3;
    --accent: #c7d840;
    --border: rgba(239, 236, 227, 0.12);
    --max-w: 880px;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    background-color: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    line-height: 1.5;
  }

  .bg-photo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    z-index: -1;
    opacity: 0.6;
    pointer-events: none;
    background-image: radial-gradient(ellipse at center, transparent 35%, var(--bg) 100%),
                       url('assets/img/hero-bg.jpg');
    background-size: cover, cover;
    background-position: center center, center center;
    background-repeat: no-repeat, no-repeat;
  }

  h1, h2, h3 {
    font-weight: 400;
    letter-spacing: 0.02em;
    margin: 0;
  }

  h2 {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
  }

  a { color: inherit; }

  .wrap {
    max-width: var(--max-w);
    margin: 0 auto;
    padding: 0 24px;
  }

  /* HERO */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    overflow: hidden;
  }

  .hero-title {
    font-family: 'BBH Hegarty', 'Inter', sans-serif;
    font-weight: 400;
    font-size: clamp(4rem, 22vw, 15rem);
    line-height: 0.9;
    text-transform: uppercase;
    text-align: center;
    letter-spacing: -0.13em;
    color: transparent;
    -webkit-text-stroke: 2px var(--ink);
    paint-order: stroke fill;
    margin: 0;
  }

  .scroll-btn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--ink);
    text-decoration: none;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }

  .scroll-btn:hover {
    border-color: var(--accent);
    transform: translateX(-50%) translateY(4px);
  }

  .scroll-btn svg {
    width: 20px;
    height: 20px;
    fill: currentColor;
  }

  /* ALBUM SECTION */
  .album {
    padding-top: 40px;
  }

  .eyebrow {
    color: var(--accent);
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 10px;
    display: block;
  }

  .album-title {
    font-size: clamp(2.4rem, 7vw, 4rem);
    text-transform: none;
  }

  .album-meta {
    color: var(--concrete-dim);
    margin-top: 10px;
    font-size: 0.95rem;
  }

  .album-head {
    display: flex;
    gap: 32px;
    align-items: flex-start;
    flex-wrap: nowrap;
    margin-bottom: 40px;
  }

  .album-cover {
    width: 200px;
    height: 200px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  /* CTA PLATFORM BUTTONS */
  .cta-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 22px;
    margin-top: 28px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: opacity 0.15s ease;
  }

  .cta-btn:hover {
    opacity: 0.7;
  }

  .cta-btn svg {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    fill: #fff;
    color: #fff;
  }

  /* TRACKLIST */
  .tracklist {
    margin-top: 56px;
    border-top: 1px solid var(--border);
  }

  .track {
    border-bottom: 1px solid var(--border);
  }

  .track-head {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 18px 0;
    background: none;
    border: none;
    color: var(--ink);
    font-family: inherit;
    font-size: 1.05rem;
    text-align: left;
    cursor: pointer;
  }

  .track-num {
    color: var(--concrete-dim);
    font-variant-numeric: tabular-nums;
    width: 1.6em;
    flex-shrink: 0;
  }

  .track-name {
    flex: 1;
  }

  .track-toggle {
    color: var(--concrete-dim);
    font-size: 1.3rem;
    transition: transform 0.2s ease;
    flex-shrink: 0;
  }

  .track.open .track-toggle {
    transform: rotate(45deg);
    color: var(--accent);
  }

  .track-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.25s ease;
  }

  .track.open .track-body {
    grid-template-rows: 1fr;
  }

  .track-body-inner {
    overflow: hidden;
  }

  .track-content {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    padding: 4px 0 28px;
  }

  .track-lyrics, .track-credits {
    flex: 1;
    min-width: 220px;
  }

  .track-content h4 {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--concrete-dim);
    margin-bottom: 10px;
  }

  .lyrics-text {
    white-space: pre-line;
    color: var(--concrete);
    font-size: 0.95rem;
  }

  .lyrics-placeholder {
    color: var(--concrete-dim);
    font-style: italic;
    font-size: 0.9rem;
  }

  .credits-list {
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 0.9rem;
  }

  .credits-list li {
    padding: 4px 0;
    color: var(--concrete);
  }

  .credits-list b {
    color: var(--ink);
    font-weight: 600;
  }

  .album-credit {
    margin: 24px 0 0;
    color: var(--concrete-dim);
    font-size: 0.85rem;
  }

  /* VIDEO */
  .video-section {
    padding: 0 0 80px;
    margin-top: 40px;
  }

  .video-embed {
    position: relative;
    padding-top: 56.25%;
    border: 1px solid var(--border);
  }

  .video-embed iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  /* PHOTO STRIP */
  .photo-strip {
    display: flex;
    gap: 0;
  }

  .photo-strip img {
    flex: 1 1 0;
    min-width: 0;
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
  }

  .photo-wrap {
    padding-bottom: 100px;
  }

  @media (max-width: 560px) {
    .photo-strip { flex-direction: column; }
  }

  @media (max-width: 560px) {
    .album-head { flex-direction: column; gap: 20px; }
    .album-cover { width: 140px; height: 140px; }
    .track-content { flex-direction: column; gap: 20px; }
  }
</style>
</head>

  function renderCTAs() {
    const row = document.getElementById('cta-row');
    row.innerHTML = PLATFORMS.map(p =>
      `<a class="cta-btn" href="${p.url}" target="_blank" rel="noopener" aria-label="${p.name}" title="${p.name}">${p.icon}</a>`
    ).join('');
  }

  function renderCreditsList(credits) {
    return credits.map(c =>
      `<li><b>${c.name}</b> (${c.roles.join(', ')})</li>`
    ).join('');
  }

  function renderTracks() {
    const list = document.getElementById('tracklist');
    list.innerHTML = TRACKS.map((t, i) => `
      <div class="track">
        <button class="track-head" aria-expanded="false">
          <span class="track-num">${String(i + 1).padStart(2, '0')}</span>
          <span class="track-name">${t.title}</span>
          <span class="track-toggle">+</span>
        </button>
        <div class="track-body">
          <div class="track-body-inner">
            <div class="track-content">
              <div class="track-lyrics">
                <h4>Letra</h4>
                ${t.lyrics
                  ? `<div class="lyrics-text">${t.lyrics}</div>`
                  : `<p class="lyrics-placeholder">Letra em breve.</p>`}
              </div>
              <div class="track-credits">
                <h4>Ficha técnica</h4>
                <ul class="credits-list">${renderCreditsList(t.credits)}</ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    `).join('');

    list.querySelectorAll('.track-head').forEach(btn => {
      btn.addEventListener('click', () => {
        const track = btn.closest('.track');
        const isOpen = track.classList.toggle('open');
        btn.setAttribute('aria-expanded', String(isOpen));
      });
    });
  }

  renderCTAs();
  renderTracks();
</script>
